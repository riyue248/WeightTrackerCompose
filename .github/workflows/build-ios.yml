name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Kotlin framework for iOS
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd iosApp
          xcodegen generate
          # Patch project to skip code signing for ad-hoc export
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Manual; CODE_SIGN_IDENTITY = ""; CODE_SIGNING_REQUIRED = NO; CODE_SIGNING_ALLOWED = NO;/g' iosApp.xcodeproj/project.pbxproj

      - name: Build iOS archive
        run: |
          cd iosApp
          xcodebuild -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build/iosApp.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Export IPA
        run: |
          cd iosApp
          mkdir -p build/Payload
          cp -R build/iosApp.xcarchive/Products/Applications/iosApp.app build/Payload/
          cd build
          ditto -c -k --keepParent Payload WeightTracker-iOS.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WeightTracker-iOS
          path: iosApp/build/*.ipa
